# 1. Force HTTP to HTTPS Redirect
server {
    listen 80;
    server_name jamydev.com www.jamydev.com;

    # Keep the Let's Encrypt doorway open for future renewals
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# 2. The Secure HTTPS Server
server {
    listen 443 ssl;
    server_name jamydev.com www.jamydev.com;

    # Point Nginx to the cryptographic keys Certbot downloaded
    ssl_certificate /etc/letsencrypt/live/jamydev.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/jamydev.com/privkey.pem;

    # Serve the React Website
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Reverse Proxy for the Backend API
    location /v1/ {
        proxy_pass http://hirepath-backend:8080/v1/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}